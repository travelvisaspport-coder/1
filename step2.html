<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختيار الطلب</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="card">
<h2>🌍 اختيار الدولة ونوع السفر</h2>

<select id="country">
<option value="">اختر الدولة</option>
<option>فرنسا</option>
<option>إسبانيا</option>
<option>إيطاليا</option>
</select>

<select id="type">
<option value="">نوع السفر</option>
<option>سياحة</option>
<option>عمل</option>
<option>إقامة</option>
</select>

<button onclick="next()">التالي</button>
</div>

</div>

<script>
function next(){
  if(document.getElementById("country").value=="" ||
     document.getElementById("type").value==""){
    alert("يرجى ملء جميع الحقول");
    return;
  }
  location.href="step3.html";
}
</script>

</body>
</html>
