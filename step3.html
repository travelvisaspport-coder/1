<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>البيانات</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">✈ البيانات الشخصية</div>

<div class="container">

<div class="stepbar">
  <div>1</div>
  <div class="active">2</div>
  <div>3</div>
  <div>4</div>
</div>

<div class="card">

<h2>👤 المعلومات</h2>

<input id="name" placeholder="الاسم الكامل">
<input id="passport" placeholder="رقم الجواز">
<input id="phone" placeholder="رقم الهاتف">

<button onclick="next()">التالي</button>

</div>

</div>

<script>
function next(){
  let n=document.getElementById("name").value;
  let p=document.getElementById("passport").value;
  let ph=document.getElementById("phone").value;

  if(n=="" || p=="" || ph==""){
    alert("يرجى ملء جميع البيانات");
    return;
  }
  location.href="step4.html";
}
</script>

</body>
</html>
